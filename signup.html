<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join DisabledRise</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:linear-gradient(135deg,#fffdf5,#fff8e1);font-family:'Segoe UI',Arial,sans-serif;color:#111;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:#fff;border:2px solid #f5f0e0;border-radius:28px;padding:48px;width:100%;max-width:440px;margin:20px;box-shadow:0 20px 60px rgba(184,134,11,0.08);}
.logo{font-size:1.8rem;font-weight:900;text-align:center;margin-bottom:6px;cursor:pointer;background:linear-gradient(135deg,#b8860b,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.subtitle{text-align:center;color:#bbb;font-size:0.8rem;letter-spacing:2px;margin-bottom:36px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:0.75rem;font-weight:700;color:#aaa;letter-spacing:1px;margin-bottom:6px;}
.field input,.field select{width:100%;padding:12px 16px;background:#fffdf5;border:2px solid #f5f0e0;border-radius:12px;color:#111;font-size:0.9rem;outline:none;transition:border-color 0.2s;font-family:inherit;}
.field input:focus,.field select:focus{border-color:#ffd700;}
.field select option{background:#fff;}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#b8860b,#ffd700);border:none;border-radius:50px;font-size:0.9rem;font-weight:900;color:#fff;cursor:pointer;margin-top:8px;box-shadow:0 4px 20px rgba(184,134,11,0.3);}
.btn:disabled{opacity:0.5;}
.link{text-align:center;margin-top:20px;font-size:0.75rem;color:#bbb;}
.link a{color:#b8860b;text-decoration:none;font-weight:700;}
.error{background:#fff0f0;border:2px solid #ffcccc;border-radius:10px;padding:10px 14px;font-size:0.78rem;color:#e63946;margin-bottom:16px;display:none;}
.success{display:none;text-align:center;padding:20px;}
.success h2{font-size:1.5rem;font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,#b8860b,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.success p{color:#aaa;font-size:0.85rem;line-height:1.8;}
.safe{text-align:center;margin-top:20px;font-size:0.65rem;letter-spacing:2px;color:#ddd;}
</style>
</head>
<body>
<div class="card">
  <div class="logo" onclick="window.location.href='index.html'">✨ DisabledRise</div>
  <div class="subtitle">JOIN THE MOVEMENT</div>
  <div id="form">
    <div class="error" id="error"></div>
    <div class="field"><label>USERNAME</label><input type="text" id="username" placeholder="Pick a username"/></div>
    <div class="field"><label>PASSWORD</label><input type="password" id="password" placeholder="Make it strong!"/></div>
    <div class="field"><label>AGE</label><input type="number" id="age" min="4" max="99" placeholder="How old are you?"/></div>
    <div class="field">
      <label>I AM A... (optional)</label>
      <select id="role">
        <option value="kid">Kid with a disability</option>
        <option value="parent">Parent of a disabled kid</option>
        <option value="ally">Ally / supporter</option>
        <option value="other">Other</option>
      </select>
    </div>
    <button class="btn" id="btn" onclick="signup()">✨ Join DisabledRise</button>
    <div class="link">Already have an account? <a href="login.html">Log in</a></div>
    <div class="safe">🛡️ FREE · SAFE · NO EMAIL NEEDED</div>
  </div>
  <div class="success" id="success">
    <div style="font-size:3rem;margin-bottom:16px;">✨</div>
    <h2>Welcome to DisabledRise!</h2>
    <p>You're now part of the movement.<br>Every kid can rise.</p>
    <br>
    <button class="btn" onclick="window.location.href='index.html'">Go to DisabledRise →</button>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
const app = initializeApp({apiKey:"AIzaSyBF8NZvpjz8blZi4LL-Q7n-Q3Je73mZ5mo",authDomain:"kid-stock-7a377.firebaseapp.com",projectId:"kid-stock-7a377",storageBucket:"kid-stock-7a377.firebasestorage.app",messagingSenderId:"153069846242",appId:"1:153069846242:web:bdae0c7bb120e9245228bb"});
const auth = getAuth(app);
window.signup = async function() {
  const username=document.getElementById('username').value.trim();
  const password=document.getElementById('password').value;
  const age=parseInt(document.getElementById('age').value);
  const err=document.getElementById('error');
  const btn=document.getElementById('btn');
  err.style.display='none';
  if(!username||!password||!age){err.textContent='Please fill in all fields!';err.style.display='block';return;}
  if(username.length<3){err.textContent='Username needs at least 3 characters!';err.style.display='block';return;}
  if(password.length<6){err.textContent='Password needs at least 6 characters!';err.style.display='block';return;}
  btn.disabled=true;btn.textContent='Joining...';
  const fakeEmail=username.toLowerCase().replace(/[^a-z0-9]/g,'')+'@disabledrise.app';
  try{
    const cred=await createUserWithEmailAndPassword(auth,fakeEmail,password);
    await updateProfile(cred.user,{displayName:username});
    document.getElementById('form').style.display='none';
    document.getElementById('success').style.display='block';
  }catch(e){
    let msg='Something went wrong!';
    if(e.code==='auth/email-already-in-use')msg='That username is taken! Try another.';
    if(e.code==='auth/weak-password')msg='Password needs at least 6 characters!';
    err.textContent=msg;err.style.display='block';btn.disabled=false;btn.textContent='✨ Join DisabledRise';
  }
};
</script>
</body>
</html>
